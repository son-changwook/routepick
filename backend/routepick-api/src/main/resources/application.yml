spring:
  profiles:
    active: dev
  application:
    name: routepick-api
  
  # 데이터베이스 설정
  datasource:
    driver-class-name: com.mysql.cj.jdbc.Driver
    url: jdbc:mysql://${DB_HOST:localhost}:${DB_PORT:3306}/${DB_NAME:routepick}?useSSL=false&serverTimezone=UTC&characterEncoding=UTF-8&allowPublicKeyRetrieval=true
    username: ${DB_USERNAME:routepick}
    password: ${DB_PASSWORD:routepick}
  
  # Redis 설정
  redis:
    host: ${SPRING_REDIS_HOST:localhost}
    port: ${SPRING_REDIS_PORT:6379}
    password: ${SPRING_REDIS_PASSWORD:routepick-redis-password}
    timeout: ${SPRING_REDIS_TIMEOUT:2000ms}
    database: 0
    lettuce:
      pool:
        max-active: ${SPRING_REDIS_LETTUCE_POOL_MAX_ACTIVE:8}
        max-idle: ${SPRING_REDIS_LETTUCE_POOL_MAX_IDLE:8}
        min-idle: ${SPRING_REDIS_LETTUCE_POOL_MIN_IDLE:0}
        max-wait: -1ms
      shutdown-timeout: 100ms
  
  # 이메일 설정
  mail:
    host: ${MAIL_HOST:smtp.gmail.com}
    port: ${MAIL_PORT:587}
    username: ${MAIL_USERNAME:routepick@gmail.com}
    password: ${MAIL_PASSWORD:}
    properties:
      mail:
        smtp:
          auth: true
          starttls:
            enable: true
            required: true
          ssl:
            trust: smtp.gmail.com
          connectiontimeout: 5000
          timeout: 5000
          writetimeout: 5000
    default-encoding: UTF-8
    test-connection: false

# 공통 로깅 설정
logging:
  level:
    root: INFO
    org.springframework: INFO
    org.hibernate: INFO
    com.routepick.api.service.email: DEBUG  # 이메일 서비스 로깅 추가

# 공통 서버 설정
server:
  error:
    include-message: always
    include-binding-errors: always
    include-stacktrace: never

# MyBatis 설정
mybatis:
  mapper-locations: classpath:mapper/**/*.xml
  type-aliases-package: com.routepick.common.domain
  configuration:
    map-underscore-to-camel-case: true

# 이메일 관련 설정
email:
  verification:
    code-expires-minutes: 5
    session-expires-minutes: 10
    from-email: ${MAIL_FROM:noreply@routepick.com}
    subject: "[RoutePick] 이메일 인증 코드"
    template:
      verification-code: |
        안녕하세요!
        
        RoutePick 회원가입을 위한 인증 코드입니다.
        
        인증 코드: {verificationCode}
        
        이 코드는 5분 후에 만료됩니다.
        본인이 요청하지 않은 경우 이 이메일을 무시하세요.
        
        감사합니다.
        RoutePick 팀

# Swagger/OpenAPI 설정
springdoc:
  api-docs:
    path: /api-docs
  swagger-ui:
    path: /swagger-ui.html
    tags-sorter: alpha
    operations-sorter: alpha
    doc-expansion: none
    disable-swagger-default-url: true
  packages-to-scan: com.routepick.api.controller

# JWT 설정 (보안 강화)
api:
  jwt:
    # 프로덕션 환경에서는 반드시 환경변수로 설정해야 함
    # 개발 환경용 기본값 (프로덕션에서는 반드시 변경)
    secret: ${JWT_SECRET:Wgk4m2KYZ/lY55oDW4ky4nQM2bkZwqR1yhI8mTH3r5g4o3/LQfifkQHNALXhexGyjQzsOtjYiT06tLhKGDvtXQ==}
    expiration: ${JWT_EXPIRATION:1800000}  # 30분 (밀리초) - 보안 강화
    refresh-expiration: ${JWT_REFRESH_EXPIRATION:604800000}  # 7일 (밀리초) - 보안 강화
    issuer: ${JWT_ISSUER:routepick-api}
    # 추가 보안 설정
    algorithm: ${JWT_ALGORITHM:HS512}  # HMAC-SHA512 사용
    clock-skew: ${JWT_CLOCK_SKEW:30000}  # 30초 클록 스큐 허용

# Rate Limiting 설정
rate-limit:
  ip:
    max-requests: ${RATE_LIMIT_IP_MAX_REQUESTS:100}
    window-seconds: ${RATE_LIMIT_IP_WINDOW_SECONDS:60}
  email:
    max-requests: ${RATE_LIMIT_EMAIL_MAX_REQUESTS:10}
    window-seconds: ${RATE_LIMIT_EMAIL_WINDOW_SECONDS:3600}
    
# 파일 업로드 설정
file-upload:
  max-size: ${MAX_FILE_SIZE:5242880}  # 5MB
  allowed-extensions: ${ALLOWED_FILE_EXTENSIONS:.jpg,.jpeg,.png,.gif}
