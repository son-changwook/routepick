spring:
  datasource:
    driver-class-name: com.mysql.cj.jdbc.Driver
    url: jdbc:mysql://localhost:3306/routepick?useSSL=false&allowPublicKeyRetrieval=true&serverTimezone=UTC
    username: routepick
    password: routepick
  jpa:
    hibernate:
      ddl-auto: validate
    show-sql: true
    properties:
      hibernate:
        format_sql: true
        dialect: org.hibernate.dialect.MySQL8Dialect

mybatis:
  mapper-locations: classpath:mapper/**/*.xml
  type-aliases-package: com.routepick.admin.domain
  configuration:
    map-underscore-to-camel-case: true

server:
  port: 8081
  servlet:
    context-path: /admin

logging:
  level:
    com.routepick.admin: DEBUG
    org.springframework: INFO
